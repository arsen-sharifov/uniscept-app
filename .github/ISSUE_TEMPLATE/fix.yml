name: Bug
description: Something is broken
title: 'fix: '
labels: [fix]
body:
  - type: textarea
    id: summary
    attributes:
      label: Summary
    validations:
      required: true

  - type: textarea
    id: repro
    attributes:
      label: Steps to reproduce
      placeholder: |
        1.
        2.
        3.
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected

  - type: textarea
    id: actual
    attributes:
      label: Actual

  - type: input
    id: env
    attributes:
      label: Environment
      placeholder: Branch / build / browser / OS
