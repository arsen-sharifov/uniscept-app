name: Setup pnpm + Node
description: Install pnpm, Node from .nvmrc, and project dependencies with a cached store.

runs:
  using: composite
  steps:
    - name: Setup pnpm
      uses: pnpm/action-setup@v6
      with:
        version: 10.29.3

    - name: Setup Node
      uses: actions/setup-node@v6
      with:
        node-version-file: .nvmrc
        cache: pnpm

    - name: Install dependencies
      shell: bash
      run: pnpm install --frozen-lockfile
